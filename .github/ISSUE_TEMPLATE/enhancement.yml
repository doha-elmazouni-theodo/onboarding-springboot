name: Enhancement request
description: Propose a new feature or improvement.
title: "[Enhancement]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are we solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Other approaches and why not chosen.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits? Any migration/compatibility implications?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define done in testable bullets.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
