name: Bug report
description: Report a defect or regression in the blueprint.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: One clear sentence.
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens now?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and sample input when possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Optional. Java, OS, IDE, Docker, CI context.
      placeholder: "Java 25, macOS, IntelliJ 2025.3"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Suggested acceptance criteria
      description: Optional. What must pass for this to be done?
    validations:
      required: false
